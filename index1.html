<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark Loading Screen</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* إضافة تنسيق صندوق ملاك السيرفر على اليمين */
        .owners-container {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        .owner-card {
            background: rgba(30, 30, 30, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 173, 181, 0.3);
            padding: 15px 25px;
            border-radius: 12px;
            min-width: 180px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
        }

        .owner-card:hover {
            transform: translateX(-5px);
            border-color: #00adb5;
            box-shadow: 0 0 15px rgba(0, 173, 181, 0.5);
        }

        .owner-title {
            font-family: 'Cairo', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #00adb5;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 5px 0;
        }

        .owner-name {
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        /* لضمان توافق الشاشة على الهواتف واختفاء القائمة الجانبية إذا ضاقت الشاشة */
        @media (max-width: 1024px) {
            .owners-container {
                position: relative;
                right: auto;
                top: auto;
                transform: none;
                flex-direction: row;
                justify-content: center;
                margin-bottom: 25px;
            }
        }
    </style>
</head>
<body>
    <audio id="background-music" loop preload="auto">
        <source src="assets/music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- صندوق حقول الـ Server Owner على اليمين -->
    <div class="owners-container">
        <div class="owner-card">
            <p class="owner-title">Server Owner</p>
            <h3 class="owner-name">BLACK</h3>
        </div>
        <div class="owner-card">
            <p class="owner-title">Server Owner</p>
            <h3 class="owner-name">ابو ايليا</h3>
        </div>
    </div>

    <div class="loading-container">
        <div class="background-animation">
            <div class="particles"></div>
            <div class="waves">
                <div class="wave wave1"></div>
                <div class="wave wave2"></div>
                <div class="wave wave3"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="logo-container">
                <div class="logo-wrapper">
                    <img src="assets/LOGO.png" alt="Stark Logo" class="logo">
                    <div class="logo-glow"></div>
                </div>
            </div>

            <div class="server-name">
                <h1 class="server-title">Stark County </h1>
                <p class="server-subtitle">متجرنا دائما في  خدمتكم بأفضل المنتجات  </p>
            </div>

            <div class="loading-section">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                        <div class="progress-text">
                            <span id="progress-percentage">0%</span>
                        </div>
                    </div>
                    <progress id="loading-bar" value="0" max="1" style="display: none;"></progress>
                </div>
                
                <div class="loading-text">
                    <p id="loading-message">جاري التحميل...</p>
                </div>
            </div>

            <div class="info-cards">
                <div class="info-card">
                    <i class="fas fa-users"></i>
                    <h3>Stark County</h3>
                    <p>أفضل المبرمجين فالوطن العربي</p>
                </div>
                <div class="info-card">
                    <i class="fas fa-shield-alt"></i>
                    <h3>حماية عالية</h3>
                    <p>نظام أمان متطور ضد المخربين</p>
                </div>
                <div class="info-card">
                    <i class="fas fa-rocket"></i>
                    <h3>تحديثات مستمرة</h3>
                    <p>محتوى جديد كل أسبوع</p>
                </div>
            </div>

            <div class="social-links">
                <a href="#" class="social-link discord" data-platform="discord">
                    <i class="fab fa-discord"></i>
                </a>
                <a href="#" class="social-link instagram" data-platform="instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="#" class="social-link youtube" data-platform="youtube">
                    <i class="fab fa-youtube"></i>
                </a>
                <a href="#" class="social-link tiktok" data-platform="tiktok">
                    <i class="fab fa-tiktok"></i>
                </a>
            </div>

            <div class="footer">
                <p>&copy;مقاطعة ستارك جميع الحقوق محفوظة</p>
                <div class="server-status">
                    <span class="status-dot"></span>
                    <span>الخادم متصل</span>
                </div>
            </div>
        </div>

        <div class="music-control">
            <button id="music-toggle">
                <i class="fas fa-volume-up"></i>
            </button>
        </div>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
